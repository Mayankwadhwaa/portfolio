document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"8783d3a2-694e-4c07-82d6-9ee12a2a3e67\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"46c1d911-b6f5-4a77-8d2e-429d672257ad\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2d27db03-ee57-4153-849d-85bdd8aad59a\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8783d3a2-694e-4c07-82d6-9ee12a2a3e67\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>:root{\n  --bg-0:#02030a;\n  --bg-1:#05071a;\n  --ink:#e8eaf2;\n  --ink-dim:#8a8fa8;\n  --ink-faint:#4a4f66;\n  --line:rgba(255,255,255,.08);\n  --line-2:rgba(255,255,255,.14);\n\n  --hot-1:#ffb454;\n  --hot-2:#ff6b3d;\n  --hot-3:#ff3d6e;\n  --neon-cy:#22d3ee;\n  --neon-vi:#a78bfa;\n  --neon-mg:#ff5fb3;\n  --neon-em:#34d399;\n\n  --mono:'IBM Plex Mono', ui-monospace, monospace;\n  --display:'Space Grotesk', system-ui, sans-serif;\n}\n\n*{box-sizing:border-box;margin:0;padding:0}\nhtml,body{height:100%;background:#000;color:var(--ink);font-family:var(--display);overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n\nbody{\n  background:\n    radial-gradient(1400px 900px at 20% 40%, rgba(255,107,61,.06), transparent 60%),\n    radial-gradient(1200px 900px at 82% 60%, rgba(167,139,250,.07), transparent 60%),\n    radial-gradient(700px 500px at 50% 100%, rgba(34,211,238,.04), transparent 70%),\n    linear-gradient(180deg, #03040d 0%, #06081a 100%);\n}\n\n.stage{\n  position:fixed;inset:0;\n  display:grid;\n  grid-template-rows:64px 1fr 42px;\n}\n\n/* ===================== TOP BAR ===================== */\n.topbar{\n  display:flex;align-items:center;justify-content:space-between;\n  padding:0 28px;\n  border-bottom:1px solid var(--line);\n  background:linear-gradient(180deg, rgba(255,255,255,.025), transparent);\n  z-index:10;\n}\n.brand{display:flex;align-items:center;gap:12px;font-size:14px}\n.logo-dot{\n  width:10px;height:10px;border-radius:50%;\n  background:radial-gradient(circle at 30% 30%, #fff, #ff6b3d 50%, #6b1d10 100%);\n  box-shadow:0 0 14px rgba(255,107,61,.6);\n}\n.brand-name{font-weight:600;letter-spacing:.14em}\n.brand-sub{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;color:var(--ink-faint)}\n\n.meta{display:flex;gap:24px;font-family:var(--mono);font-size:10.5px}\n.meta-row{display:flex;gap:8px;align-items:center}\n.meta-row .k{color:var(--ink-faint);letter-spacing:.14em}\n.meta-row .v{color:var(--ink);letter-spacing:.06em;display:flex;align-items:center;gap:6px}\n.meta-row.dim .v{color:var(--ink-dim)}\n\n.pulse-dot{\n  width:7px;height:7px;border-radius:50%;background:#34d399;\n  box-shadow:0 0 0 0 rgba(52,211,153,.7);\n  animation:pulse 1.4s ease-out infinite;\n}\n@keyframes pulse{\n  0%{box-shadow:0 0 0 0 rgba(52,211,153,.5)}\n  100%{box-shadow:0 0 0 10px rgba(52,211,153,0)}\n}\n\n/* ===================== SPLIT ===================== */\n.split{\n  display:grid;\n  grid-template-columns:1fr 80px 1fr;\n  min-height:0;\n  position:relative;\n}\n\n.panel{\n  position:relative;display:flex;flex-direction:column;min-height:0;\n  padding:18px 22px 14px;overflow:hidden;\n}\n.panel-head{position:relative;z-index:3;max-width:520px;pointer-events:none}\n.panel-head.right-align{margin-left:auto;text-align:right}\n.panel-tag{\n  display:inline-flex;align-items:center;gap:8px;\n  font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--ink-dim);\n  padding:5px 11px;border:1px solid var(--line-2);border-radius:999px;\n  background:rgba(8,10,24,.85);\n  white-space:nowrap;\n}\n.tag-dot{width:6px;height:6px;border-radius:50%}\n.tag-dot.bio{background:linear-gradient(135deg,#ffb454,#ff3d6e);box-shadow:0 0 8px rgba(255,107,61,.6)}\n.tag-dot.dig{background:linear-gradient(135deg,#a78bfa,#22d3ee);box-shadow:0 0 8px rgba(167,139,250,.6)}\n.panel-title{\n  font-family:var(--display);font-weight:500;letter-spacing:-.015em;\n  font-size:34px;line-height:1.05;margin-top:12px;\n}\n.title-fade{color:var(--ink-faint);font-weight:300}\n\n/* ===================== BRAIN WRAP ===================== */\n.brain-wrap, .net-wrap{\n  position:relative;flex:1;margin-top:14px;\n  border:1px solid var(--line);border-radius:14px;\n  overflow:hidden;\n  background:\n    radial-gradient(60% 55% at 50% 50%, rgba(255,107,61,.04), transparent 70%),\n    linear-gradient(180deg, rgba(255,255,255,.012), rgba(0,0,0,.4));\n}\n.net-wrap{\n  background:\n    radial-gradient(60% 55% at 50% 50%, rgba(167,139,250,.05), transparent 70%),\n    linear-gradient(180deg, rgba(255,255,255,.012), rgba(0,0,0,.4));\n}\n\n#brain, #net{\n  position:absolute;inset:0;width:100%;height:100%;display:block;\n  cursor:grab;\n  touch-action:none;\n}\n#brain:active, #net:active{ cursor:grabbing; }\n\n/* HUD */\n.hud{\n  position:absolute;font-family:var(--mono);font-size:9.5px;color:var(--ink-dim);\n  letter-spacing:.06em;line-height:1.6;\n  padding:6px 9px;border-radius:8px;\n  background:rgba(4,6,15,.88);\n  border:1px solid var(--line);\n  min-width:108px;max-width:128px;\n  z-index:3;\n}\n.hud-tl{top:14px;left:14px}\n.hud-tr{top:14px;right:14px}\n.hud-bl{bottom:14px;left:14px}\n.hud-br{bottom:14px;right:14px}\n.hud-row{display:flex;justify-content:space-between;gap:10px;white-space:nowrap}\n.hud-row span{color:var(--ink-faint)}\n.hud-row b{color:#fff;font-weight:500}\n\n/* lobe labels (left brain) */\n.lobe-labels{position:absolute;inset:0;pointer-events:none;z-index:2}\n.lobe{\n  position:absolute;display:flex;align-items:flex-start;gap:8px;\n  opacity:.85;transition:opacity .3s, transform .3s;\n}\n.lobe:hover{ opacity:1; transform:translate(2px,-2px); }\n.lobe:hover .lobe-name{ color:#fff; text-shadow:0 0 12px var(--c, #fff); }\n.lobe-tip{\n  width:10px;height:10px;border-radius:50%;flex:0 0 auto;\n  background:var(--c);box-shadow:0 0 12px var(--c), inset 0 0 4px rgba(255,255,255,.7);\n  margin-top:3px;\n  position:relative;\n}\n.lobe-tip::before{\n  content:'';position:absolute;left:50%;top:50%;width:24px;height:24px;\n  border:1px solid var(--c);border-radius:50%;\n  transform:translate(-50%,-50%);opacity:.0;\n  transition:opacity .3s, transform .5s ease-out;\n}\n.lobe.firing .lobe-tip::before{opacity:.7;transform:translate(-50%,-50%) scale(1.6);transition:transform 1.2s ease-out, opacity 1.2s}\n.lobe-body{padding-top:1px}\n.lobe-name{\n  font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;color:#fff;\n  font-weight:500;line-height:1;\n}\n.lobe-sub{\n  font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--ink-dim);\n  margin-top:4px;line-height:1.4;\n}\n\n/* lobe positions (calibrated to brain canvas) */\n.lobe-frontal   {left:62%;top:24%}\n.lobe-parietal  {left:40%;top:11%}\n.lobe-occipital {left:6%; top:30%}\n.lobe-temporal  {left:50%;top:74%}\n.lobe-cerebellum{left:8%; top:68%}\n\n/* stimulus card */\n.stim-card{\n  position:absolute;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);\n  display:flex;align-items:center;gap:10px;\n  padding:8px 14px 8px 10px;border-radius:999px;\n  background:rgba(4,6,15,.9);border:1px solid var(--line-2);\n  opacity:0;\n  transition:opacity .35s, transform .45s cubic-bezier(.2,.8,.2,1);\n  pointer-events:none;\n  z-index:4;\n}\n.stim-card.on{opacity:1;transform:translateX(-50%) translateY(0)}\n.stim-card-ic{\n  width:30px;height:30px;border-radius:50%;\n  display:flex;align-items:center;justify-content:center;\n  background:rgba(255,255,255,.04);\n}\n.stim-card-ic svg{width:18px;height:18px}\n.stim-card-meta{display:flex;flex-direction:column;gap:1px;font-family:var(--mono)}\n.stim-card-k{font-size:8.5px;letter-spacing:.22em;color:var(--ink-faint)}\n.stim-card-v{font-size:11px;letter-spacing:.06em;color:#fff}\n\n/* ===================== BRIDGE ===================== */\n.bridge{\n  position:relative;display:flex;flex-direction:column;\n  align-items:center;justify-content:center;gap:10px;\n  padding:0 8px;\n  pointer-events:none;\n  --pulse-color:#ffffff;\n}\n.bridge.pulsing .bridge-line.top{\n  background:linear-gradient(180deg, rgba(255,255,255,0) 0%, var(--pulse-color) 100%);\n  animation:bridgePulseTop 1.2s cubic-bezier(.2,.8,.2,1);\n}\n.bridge.pulsing .bridge-line.bot{\n  background:linear-gradient(180deg, var(--pulse-color) 0%, rgba(255,255,255,0) 100%);\n  animation:bridgePulseBot 1.2s cubic-bezier(.2,.8,.2,1);\n}\n.bridge.pulsing .bridge-dot{\n  animation:bridgeDotPulse 1.2s ease-out;\n}\n@keyframes bridgePulseTop{\n  0%{filter:brightness(1);opacity:.6}\n  35%{filter:brightness(2.2);opacity:1}\n  100%{filter:brightness(1);opacity:.55}\n}\n@keyframes bridgePulseBot{\n  0%{filter:brightness(1);opacity:.6}\n  35%{filter:brightness(2.2);opacity:1}\n  100%{filter:brightness(1);opacity:.55}\n}\n@keyframes bridgeDotPulse{\n  0%{box-shadow:0 0 10px rgba(255,255,255,.6); transform:translate(-50%,-50%) scale(1)}\n  35%{box-shadow:0 0 28px var(--pulse-color), 0 0 50px var(--pulse-color); transform:translate(-50%,-50%) scale(1.7); background:var(--pulse-color)}\n  100%{box-shadow:0 0 10px rgba(255,255,255,.6); transform:translate(-50%,-50%) scale(1); background:#fff}\n}\n.bridge-line{\n  flex:1;width:1px;\n  background:linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.2) 50%, rgba(255,255,255,0) 100%);\n}\n.bridge-line.top{\n  background:linear-gradient(180deg, rgba(255,255,255,0), rgba(255,180,84,.35) 100%);\n}\n.bridge-line.bot{\n  background:linear-gradient(180deg, rgba(167,139,250,.35), rgba(255,255,255,0));\n}\n.bridge-node{\n  position:relative;width:14px;height:14px;\n}\n.bridge-dot{\n  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);\n  width:6px;height:6px;border-radius:50%;background:#fff;\n  box-shadow:0 0 10px rgba(255,255,255,.6);\n}\n.bridge-ring{\n  position:absolute;inset:0;border:1px solid rgba(255,255,255,.4);\n  border-radius:50%;\n  animation:ring 2s ease-out infinite;\n}\n@keyframes ring{\n  0%{transform:scale(.7);opacity:.9}\n  100%{transform:scale(2.2);opacity:0}\n}\n.bridge-text{\n  text-align:center;font-family:var(--mono);\n  display:flex;flex-direction:column;gap:6px;align-items:center;\n}\n.bridge-label{\n  font-size:9.5px;letter-spacing:.3em;color:#fff;font-weight:500;\n  writing-mode:vertical-rl;text-orientation:mixed;\n  transform:rotate(180deg);\n  padding:6px 0;\n}\n.bridge-sub{\n  font-size:8.5px;letter-spacing:.18em;color:var(--ink-faint);line-height:1.6;\n  writing-mode:vertical-rl;text-orientation:mixed;\n  transform:rotate(180deg);\n}\n\n/* ===================== NETWORK CLUSTER LABELS ===================== */\n.cluster-labels{position:absolute;inset:0;pointer-events:none;z-index:2}\n.cluster-label{\n  position:absolute;transform:translate(-50%,-50%);\n  padding:6px 9px;border-radius:9px;\n  background:rgba(4,6,15,.88);border:1px solid var(--line-2);\n  font-family:var(--mono);\n  min-width:96px;max-width:140px;\n  transition:background .2s, border-color .2s, transform .25s cubic-bezier(.2,.8,.2,1);\n  white-space:nowrap;\n}\n.cluster-label:hover{\n  background:rgba(12,16,32,.92);\n  border-color:rgba(255,255,255,.4);\n  transform:translate(-50%,-50%) scale(1.06);\n  z-index:5;\n}\n.cluster-label:hover .cl-title{ text-shadow:0 0 10px var(--c, #fff); }\n.cluster-label:active{ transform:translate(-50%,-50%) scale(.98); }\n.cluster-label.fade{opacity:.55}\n.cl-title{font-size:10.5px;letter-spacing:.18em;color:#fff;font-weight:500;display:flex;align-items:center;gap:6px}\n.cl-title::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--c);box-shadow:0 0 8px var(--c)}\n.cl-sub{font-size:8.5px;letter-spacing:.12em;color:var(--ink-dim);margin-top:3px;line-height:1.4}\n\n.cluster-label.you{\n  background:rgba(255,255,255,.05);\n  border-color:rgba(255,255,255,.35);\n  padding:6px 12px;\n}\n.cluster-label.you .cl-title{letter-spacing:.3em;font-size:13px}\n.cluster-label.you .cl-title::before{display:none}\n\n/* ===================== BOT BAR ===================== */\n.botbar{\n  display:flex;align-items:center;justify-content:space-between;\n  padding:0 28px;\n  border-top:1px solid var(--line);\n  font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);\n  letter-spacing:.08em;\n  overflow:hidden;\n}\n.ticker{\n  flex:1;overflow:hidden;white-space:nowrap;\n  mask-image:linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);\n}\n.ticker .t-row{display:inline-block;padding-right:80px;animation:tick 90s linear infinite}\n.ticker .sep{color:var(--ink-faint);padding:0 14px}\n.ticker .hi{color:#fff}\n@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}\n\n.rhythm{display:flex;align-items:center;gap:10px;padding-left:20px}\n\n/* small viewport */\n@media (max-width:1180px){\n  .panel-title{font-size:24px}\n  .lobe-sub{display:none}\n  .cl-sub{display:none}\n  .hud{min-width:120px;font-size:9.5px}\n  .bridge-sub{display:none}\n  .split{grid-template-columns:1fr 56px 1fr}\n}\n<\u002Fsty etal\">\n              <div class=\"lobe-tip\" style=\"--c:#7fffb9\"><\u002Fdiv>\n              <div class=\"lobe-body\">\n                <div class=\"lobe-name\">PARIETAL LOBE<\u002Fdiv>\n                <div class=\"lobe-sub\">Spatial Awareness<br>Body Orientation<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"lobe lobe-occipital\">\n              <div class=\"lobe-tip\" style=\"--c:#b18bff\"><\u002Fdiv>\n              <div class=\"lobe-body\">\n                <div class=\"lobe-name\">OCCIPITAL LOBE<\u002Fdiv>\n                <div class=\"lobe-sub\">Vision<br>Visual Processing<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"lobe lobe-temporal\">\n              <div class=\"lobe-tip\" style=\"--c:#ff8a5b\"><\u002Fdiv>\n              <div class=\"lobe-body\">\n                <div class=\"lobe-name\">TEMPORAL LOBE<\u002Fdiv>\n                <div class=\"lobe-sub\">Memory · Language<br>Audio Processing<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"lobe lobe-cerebellum\">\n              <div class=\"lobe-tip\" style=\"--c:#ff6b9d\"><\u002Fdiv>\n              <div class=\"lobe-body\">\n                <div class=\"lobe-name\">CEREBELLUM<\u002Fdiv>\n                <div class=\"lobe-sub\">Motor Control<br>Coordination<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- HUD readouts -->\n          <div class=\"hud hud-tl\">\n            <div class=\"hud-row\"><span>fMRI<\u002Fspan><b id=\"fmriHz\">2.1 Hz<\u002Fb><\u002Fdiv>\n            <div class=\"hud-row\"><span>SUBJECTS<\u002Fspan><b>1,024<\u002Fb><\u002Fdiv>\n            <div class=\"hud-row\"><span>VOXELS<\u002Fspan><b id=\"voxels\">327,680<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"hud hud-bl\">\n            <div class=\"hud-row\"><span>STIMULUS<\u002Fspan><b id=\"stimType\">—<\u002Fb><\u002Fdiv>\n            <div class=\"hud-row\"><span>ACCURACY<\u002Fspan><b id=\"predErr\">98.3%<\u002Fb><\u002Fdiv>\n            <div class=\"hud-row\"><span>LATENCY<\u002Fspan><b id=\"latency\">14 ms<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- stimulus token (appears, dissolves into brain) -->\n          <div class=\"stim-card\" id=\"stimCard\">\n            <div class=\"stim-card-ic\" id=\"stimIc\"><\u002Fdiv>\n            <div class=\"stim-card-meta\">\n              <div class=\"stim-card-k\" id=\"stimK\">STREAM<\u002Fdiv>\n              <div class=\"stim-card-v\" id=\"stimV\">incoming<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- center bridge -->\n      <div class=\"bridge\" aria-hidden=\"true\">\n        <div class=\"bridge-line top\"><\u002Fdiv>\n        <div class=\"bridge-node\">\n          <div class=\"bridge-dot\"><\u002Fdiv>\n          <div class=\"bridge-ring\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"bridge-text\">\n          <div class=\"bridge-label\">NEURAL API<\u002Fdiv>\n          <div class=\"bridge-sub\">real-time<br>bidirectional<br>cognitive sync<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"bridge-node\">\n          <div class=\"bridge-dot\"><\u002Fdiv>\n          <div class=\"bridge-ring\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"bridge-line bot\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===================== RIGHT: DIGITAL BRAIN ===================== -->\n      <section class=\"panel right\">\n        <div class=\"panel-head right-align\">\n          <div class=\"panel-tag\">\n            <span class=\"tag-dot dig\"><\u002Fspan>\n            <span>II · DIGITAL SECOND BRAIN<\u002Fspan>\n          <\u002Fdiv>\n          <h2 class=\"panel-title\">A digital simulation <span class=\"title-fade\">at neural scale<\u002Fspan><\u002Fh2>\n        <\u002Fdiv>\n\n        <div class=\"net-wrap\">\n          <canvas id=\"net\"><\u002Fcanvas>\n\n          <!-- 3D-projected cluster labels -->\n          <div class=\"cluster-labels\" id=\"clusterLabels\"><\u002Fdiv>\n\n          <!-- HUD readouts -->\n          <div class=\"hud hud-tr\">\n            <div class=\"hud-row\"><span>NODES<\u002Fspan><b id=\"nNodes\">—<\u002Fb><\u002Fdiv>\n            <div class=\"hud-row\"><span>EDGES<\u002Fspan><b id=\"nEdges\">—<\u002Fb><\u002Fdiv>\n            <div class=\"hud-row\"><span>SCALE<\u002Fspan><b>256K&nbsp;sim<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"hud hud-br\">\n            <div class=\"hud-row\"><span>QUERY<\u002Fspan><b id=\"queryName\">—<\u002Fb><\u002Fdiv>\n            <div class=\"hud-row\"><span>DEPTH<\u002Fspan><b id=\"depth\">0<\u002Fb><\u002Fdiv>\n            <div class=\"hud-row\"><span>RECALL<\u002Fspan><b id=\"recall\">0.0 ms<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Fmain>\n\n    <footer class=\"botbar\">\n      <div class=\"ticker\" id=\"ticker\"><\u002Fdiv>\n      <div class=\"rhythm\">\n        <span>BIO·SYNC<\u002Fspan>\n        <span class=\"pulse-dot\"><\u002Fspan>\n        <span id=\"bpm\">72 BPM<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Ffooter>\n  <\u002Fdiv>\n\n  <script src=\"03310336-63a8-4914-9e9c-abaaa1cff5f0\"><\u002Fscript>\n  <script src=\"32322490-802b-4769-8b07-f1e68dcc6881\"><\u002Fscript>\n  <script src=\"53d2d378-81c5-41e7-b713-da32e0d3f93d\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
